# Mode TLS = manual — certificat EXTERNE obtenu via certbot (challenge DNS-01 MANUEL).
# Caddy n'émet/ne renouvelle RIEN : il sert les fichiers cert/clé fournis. Le
# renouvellement est MANUEL : `sudo bash deploy.sh cert` avant expiration (~60-90 j),
# qui affiche le TXT _acme-challenge à coller dans la zone DNS.
# Fichiers montés depuis l'hôte (<repo>/letsencrypt/) sur /etc/caddy/le (voir compose).
tls /etc/caddy/le/live/{$DOMAIN}/fullchain.pem /etc/caddy/le/live/{$DOMAIN}/privkey.pem
