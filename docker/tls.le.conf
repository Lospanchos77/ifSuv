# Mode TLS = letsencrypt — importé dans le bloc de site par Caddyfile.prod.
# Certificat Let's Encrypt via challenge DNS-01 OVH (champ TXT). Requiert un DOMAINE
# (pas une IP) + les creds OVH_* dans l'env du container caddy.
tls {
	dns ovh {
		endpoint {env.OVH_ENDPOINT}
		application_key {env.OVH_APPLICATION_KEY}
		application_secret {env.OVH_APPLICATION_SECRET}
		consumer_key {env.OVH_CONSUMER_KEY}
	}
	# Sous-domaine (zone déléguée) : attendre la propagation du TXT avant la
	# validation ACME, sinon l'émission peut échouer (cf. Caddy #6557).
	resolvers 1.1.1.1 9.9.9.9
	propagation_delay 120s
	propagation_timeout 600s
}
