# Mode TLS = internal — importé dans le bloc de site par Caddyfile.prod.
# Certificat auto-signé par la CA locale de Caddy. Utilisé quand l'hôte public est
# une IP (Let's Encrypt n'émet pas pour une IP) ou pour un déploiement interne sans
# domaine. Le navigateur affiche un avertissement tant que la racine Caddy n'est pas
# installée sur le poste (récupérable dans le volume caddy-data : /data/caddy/pki).
tls internal
